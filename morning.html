<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>朝 — archiologie</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0c0c0b; color:#e4ddd1; font-family:'Helvetica Neue',sans-serif; height:100vh; display:flex; flex-direction:column; }

    .header {
      display:flex; align-items:center; justify-content:space-between;
      padding:0.9rem 1.8rem;
      border-bottom:1px solid rgba(255,255,255,0.07);
      flex-shrink:0;
    }
    .brand { font-size:0.7rem; letter-spacing:0.35em; color:rgba(228,221,209,0.35); text-transform:uppercase; }
    .period { font-size:1rem; letter-spacing:0.2em; color:#c9a06b; }
    .now-playing { font-size:0.65rem; letter-spacing:0.12em; color:rgba(228,221,209,0.4); }

    .player { flex:1; position:relative; background:#000; }
    .player iframe {
      position:absolute; top:0; left:0;
      width:100%; height:100%; border:none;
    }

    .playlist {
      display:flex; gap:0.6rem; padding:0.9rem 1.8rem;
      background:#0c0c0b; border-top:1px solid rgba(255,255,255,0.07);
      overflow-x:auto; flex-shrink:0;
    }
    .playlist::-webkit-scrollbar { height:2px; }
    .playlist::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); }

    .thumb {
      flex-shrink:0; cursor:pointer;
      border:1.5px solid rgba(255,255,255,0.08);
      border-radius:2px; overflow:hidden;
      transition:border-color 0.2s;
      width:120px;
    }
    .thumb:hover { border-color:rgba(201,160,107,0.5); }
    .thumb.active { border-color:#c9a06b; }
    .thumb img { width:120px; height:68px; display:block; object-fit:cover; }
    .thumb .tlabel {
      padding:0.3rem 0.4rem;
      font-size:0.58rem; letter-spacing:0.06em;
      color:rgba(228,221,209,0.6);
      background:#111;
      line-height:1.4;
    }
  </style>
</head>
<body>

<div class="header">
  <span class="brand">archiologie</span>
  <span class="period">🌤 朝の環境音</span>
  <span class="now-playing" id="now-playing">再生中...</span>
</div>

<div class="player">
  <iframe id="player" src="" allow="autoplay; encrypted-media; fullscreen; picture-in-picture" allowfullscreen></iframe>
</div>

<div class="playlist" id="playlist"></div>

<script>
// ============================================================
// 朝の動画リスト — ここにURLを追加していく
// ============================================================
var VIDEOS = [
  { id: 'zWKsY0s6yMA', title: '朝の環境音 vol.1' },
  { id: '7CFbKbeGR-c',  title: '朝の環境音 vol.2' },
  // { id: 'ここに動画ID', title: 'タイトル' },
];

var current = 0;

function buildSrc(id) {
  return 'https://www.youtube.com/embed/' + id
    + '?autoplay=1&rel=0&modestbranding=1&controls=1&playsinline=1&enablejsapi=1';
}

function play(idx) {
  current = idx;
  document.getElementById('player').src = buildSrc(VIDEOS[idx].id);
  document.getElementById('now-playing').textContent = VIDEOS[idx].title;
  document.querySelectorAll('.thumb').forEach(function(t, i) {
    t.classList.toggle('active', i === idx);
  });
}

function buildPlaylist() {
  var pl = document.getElementById('playlist');
  VIDEOS.forEach(function(v, i) {
    var div = document.createElement('div');
    div.className = 'thumb';
    div.innerHTML =
      '<img src="https://img.youtube.com/vi/' + v.id + '/mqdefault.jpg">'
      + '<div class="tlabel">' + v.title + '</div>';
    div.addEventListener('click', function() { play(i); });
    pl.appendChild(div);
  });
}

// 動画終了を postMessage で検知して次へ
window.addEventListener('message', function(e) {
  try {
    var data = JSON.parse(e.data);
    // state=0 が終了
    if (data.event === 'infoDelivery' && data.info && data.info.playerState === 0) {
      current = (current + 1) % VIDEOS.length;
      play(current);
    }
  } catch(_) {}
});

buildPlaylist();
play(0);
</script>
</body>
</html>
